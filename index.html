<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PigVin High-Contrast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: Arial, sans-serif; }
        /* Video Container */
        .video-slide { height: 100vh; width: 100%; border-bottom: 5px solid #333; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        /* Große, lesbare Buttons */
        .btn-main { background: #fff; color: #000; padding: 20px; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .btn-admin { background: #ff0000; color: #fff; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Admin Panel (Standardmäßig versteckt) -->
    <div id="admin-panel" class="hidden fixed inset-0 z-50 bg-black p-5">
        <h1 class="text-4xl font-bold mb-5">ADMIN BEREICH</h1>
        <button onclick="document.getElementById('admin-panel').classList.add('hidden')" class="btn-main mb-5">X SCHLIESSEN</button>
        <div id="report-list" class="text-xl"></div>
    </div>

    <!-- Feed -->
    <div id="feed"></div>

    <!-- Upload Button -->
    <div class="fixed bottom-10 right-10">
        <button onclick="document.getElementById('video-input').click()" class="btn-main">VIDEO HOCHLADEN</button>
        <button onclick="document.getElementById('admin-panel').classList.remove('hidden')" class="btn-admin mt-2">ADMIN</button>
    </div>

    <input type="file" id="video-input" class="hidden" accept="video/*">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // DEINE CONFIG HIER EINFÜGEN
        const firebaseConfig = {
            apiKey: "AIzaSyBCFpS0xDeHl9EteigBUQq6nI2MCgyyoa8",
            projectId: "pigeon-1e2cd",
            storageBucket: "pigeon-1e2cd.firebasestorage.app",
            appId: "1:538627864447:web:6453978db81aeb5fbd4c4a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadFeed() {
            const feed = document.getElementById('feed');
            const snap = await getDocs(collection(db, "videos"));
            feed.innerHTML = "";
            snap.forEach(docSnap => {
                const data = docSnap.data();
                const div = document.createElement('div');
                div.className = 'video-slide';
                div.innerHTML = `
                    <video src="${data.url}" autoplay loop muted playsinline></video>
                    <button onclick="report('${docSnap.id}')" class="absolute top-5 right-5 text-4xl bg-black p-5 border-2 border-white">⚠️ MELDEN</button>
                `;
                feed.appendChild(div);
            });
        }

        window.report = async (id) => {
            await updateDoc(doc(db, "videos", id), { reported: true });
            alert("Video wurde gemeldet!");
        };

        loadFeed();
    </script>
</body>
</html>
