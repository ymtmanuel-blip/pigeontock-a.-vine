<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ymt Loops</title>
    <!-- Firebase Realtime Database SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a24;
            --accent-color: #00e676;
            --danger-color: #ff5252;
            --text-color: #ffffff;
            --verified-color: #2196f3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(26, 26, 36, 0.85);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #2a2a3a;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--accent-color);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-weight: bold;
            transition: transform 0.1s ease;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-primary { background-color: var(--accent-color); color: #000; }
        .btn-danger { background-color: var(--danger-color); color: #fff; }
        .btn-secondary { background-color: #2a2a3a; color: #fff; }

        main {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .loop-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2a2a3a;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .video-container {
            width: 100%;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            max-height: 500px;
            display: block;
            object-fit: cover;
        }

        .loop-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .loop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loop-author {
            font-weight: bold;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .verified-badge {
            color: var(--verified-color);
            font-size: 1rem;
        }

        .loop-title {
            font-size: 1.05rem;
            color: #ddd;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .like-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #2a2a3a;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #3a3a4a;
            background: #0f0f12;
            color: #fff;
        }

        #ban-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: #100000;
            color: var(--danger-color);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .admin-panel {
            background: #201212;
            border: 1px solid var(--danger-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Banned Screen -->
    <div id="ban-overlay">
        <h1>🚫 PERMANENT GEBANNT</h1>
        <p style="margin-top: 10px; color: #aaa;">Dieses Gerät wurde dauerhaft gesperrt.</p>
    </div>

    <!-- Header -->
    <header>
        <h1>ymt Loops</h1>
        <div>
            <button class="btn-primary" onclick="openModal('upload-modal')">+ Hochladen</button>
            <button class="btn-secondary" onclick="loginAdmin()">Admin</button>
        </div>
    </header>

    <main>
        <!-- Admin Panel -->
        <div id="admin-panel" class="admin-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="color: var(--danger-color); font-weight:bold;">🛡️ Admin Panel (ymtmanuel)</span>
                <button class="btn-secondary" style="padding: 2px 8px;" onclick="closeAdmin()">X</button>
            </div>
            <p style="font-size: 0.85rem; color: #ccc; margin-bottom: 10px;">Gemeldete Videos verwalten und Täter bannen:</p>
            <div id="reported-list"></div>
        </div>

        <!-- Feed -->
        <div id="feed">
            <p style="text-align: center; color: #666;">Lade Loops...</p>
        </div>
    </main>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <h2>Video hochladen</h2>
            <p style="font-size: 0.8rem; color: #aaa;">Maximal 2 Minuten 10 Sekunden (130s)</p>
            <input type="text" id="username" placeholder="Dein Username...">
            <input type="text" id="video-title" placeholder="Titel des Loops...">
            <input type="file" id="video-file" accept="video/*">
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn-secondary" onclick="closeModal('upload-modal')">Abbrechen</button>
                <button class="btn-primary" onclick="uploadVideo()">Hochladen</button>
            </div>
            <p id="upload-status" style="font-size: 0.85rem; color: var(--accent-color);"></p>
        </div>
    </div>

    <script>
        // --- REALTIME DATABASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBCFpS0xDeHl9EteigBUQq6nI2MCgyyoa8",
            authDomain: "pigeon-1e2cd.firebaseapp.com",
            databaseURL: "https://pigeon-1e2cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pigeon-1e2cd",
            storageBucket: "pigeon-1e2cd.firebasestorage.app",
            messagingSenderId: "538627864447",
            appId: "1:538627864447:web:8f917799e135b889bd4c4a",
            measurementId: "G-0F13EEQ4EQ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- BAN CHECK ---
        function checkBanStatus() {
            if (localStorage.getItem("ymt_banned") === "true") {
                document.getElementById("ban-overlay").style.display = "flex";
            }
        }
        checkBanStatus();

        // --- FEED LADEN ---
        function loadFeed() {
            const feedContainer = document.getElementById("feed");
            db.ref("loops").on("value", snapshot => {
                feedContainer.innerHTML = "";
                if (!snapshot.exists()) {
                    feedContainer.innerHTML = '<p style="text-align: center; color: #666;">Noch keine Loops da. Sei der Erste!</p>';
                    return;
                }

                const loops = [];
                snapshot.forEach(child => {
                    loops.unshift({ id: child.key, ...child.val() });
                });

                loops.forEach(data => {
                    const likes = data.likes || 0;
                    const isVerified = (data.username === "ymtmanuel");
                    const badge = isVerified ? '<span class="verified-badge" title="Verifiziert">☑️</span>' : '';

                    const card = document.createElement("div");
                    card.className = "loop-card";
                    card.innerHTML = `
                        <div class="video-container">
                            <video src="${data.url}" controls loop playsinline></video>
                        </div>
                        <div class="loop-info">
                            <div class="loop-header">
                                <span class="loop-author">@${escapeHtml(data.username || 'Anonym')} ${badge}</span>
                            </div>
                            <div class="loop-title">${escapeHtml(data.title)}</div>
                            <div class="actions">
                                <button class="like-btn" onclick="likeVideo('${data.id}', ${likes})">
                                    ❤️ <span>${likes}</span>
                                </button>
                                <button class="btn-secondary" style="padding: 4px 10px; font-size: 0.8rem;" onclick="reportVideo('${data.id}')">🚩 Melden</button>
                            </div>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            });
        }

        // --- LIKE FUNKTION ---
        function likeVideo(videoId, currentLikes) {
            db.ref(`loops/${videoId}`).update({ likes: currentLikes + 1 });
        }

        // --- UPLOAD FUNKTION ---
        async function uploadVideo() {
            const usernameInput = document.getElementById("username");
            const titleInput = document.getElementById("video-title");
            const fileInput = document.getElementById("video-file");
            const status = document.getElementById("upload-status");

            const enteredUsername = usernameInput.value.trim().toLowerCase();
            const rawTitle = titleInput.value.trim();

            if (!enteredUsername || !rawTitle || !fileInput.files[0]) {
                alert("Bitte fülle alle Felder aus!");
                return;
            }

            status.innerText = "Prüfe Username...";

            // Prüfe Username
            const userSnapshot = await db.ref(`usernames/${enteredUsername}`).once("value");
            
            if (enteredUsername === "ymtmanuel") {
                const adminPass = prompt("Sicherheitsabfrage für ymtmanuel Passwort:");
                if (adminPass !== "admin123") {
                    alert("🚫 Zugriff auf ymtmanuel verweigert!");
                    status.innerText = "";
                    return;
                }
            } else if (userSnapshot.exists()) {
                alert("🚫 Dieser Username ist bereits vergeben!");
                status.innerText = "";
                return;
            }

            const file = fileInput.files[0];
            const videoElement = document.createElement('video');
            videoElement.preload = 'metadata';
            videoElement.src = URL.createObjectURL(file);

            videoElement.onloadedmetadata = async function() {
                window.URL.revokeObjectURL(videoElement.src);

                if (videoElement.duration > 130) {
                    alert("🚫 Video ist länger als 2 Min. 10 Sek.");
                    status.innerText = "";
                    return;
                }

                status.innerText = "Verarbeite Video...";

                // Video in Base64 umwandeln und in Realtime DB speichern
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const videoBase64 = e.target.result;

                    if (enteredUsername !== "ymtmanuel") {
                        await db.ref(`usernames/${enteredUsername}`).set(true);
                    }

                    await db.ref("loops").push({
                        username: enteredUsername,
                        title: rawTitle,
                        url: videoBase64,
                        likes: 0,
                        timestamp: Date.now(),
                        reported: false
                    });

                    status.innerText = "Erfolgreich hochgeladen!";
                    setTimeout(() => {
                        closeModal('upload-modal');
                        titleInput.value = "";
                        fileInput.value = "";
                        status.innerText = "";
                    }, 1000);
                };

                reader.readAsDataURL(file);
            };
        }

        // --- MELDE-FUNKTION ---
        function reportVideo(videoId) {
            db.ref(`loops/${videoId}`).update({ reported: true });
            alert("Video wurde an ymtmanuel gemeldet.");
        }

        // --- ADMIN PANEL ---
        function loginAdmin() {
            const username = prompt("Admin Benutzername:");
            if (username === "ymtmanuel") {
                document.getElementById("admin-panel").style.display = "block";
                loadReportedVideos();
            } else {
                alert("Falscher Admin-Name!");
            }
        }

        function closeAdmin() {
            document.getElementById("admin-panel").style.display = "none";
        }

        function loadReportedVideos() {
            const list = document.getElementById("reported-list");
            db.ref("loops").orderByChild("reported").equalTo(true).on("value", snapshot => {
                list.innerHTML = "";
                if (!snapshot.exists()) {
                    list.innerHTML = '<p style="font-size:0.85rem; color:#aaa;">Keine gemeldeten Videos.</p>';
                    return;
                }

                snapshot.forEach(child => {
                    const data = child.val();
                    const item = document.createElement("div");
                    item.style.cssText = "background: #1a1a24; padding: 10px; border-radius: 8px; margin-bottom: 8px;";
                    item.innerHTML = `
                        <p><strong>@${escapeHtml(data.username)}</strong>: ${escapeHtml(data.title)}</p>
                        <div style="margin-top: 5px; display:flex; gap:5px;">
                            <button class="btn-danger" onclick="banAndDelete('${child.key}')">Löschen & Bannen</button>
                            <button class="btn-secondary" onclick="ignoreReport('${child.key}')">Meldung ignorieren</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        function banAndDelete(videoId) {
            if (confirm("Video löschen und Gerät sperren?")) {
                db.ref(`loops/${videoId}`).remove();
                localStorage.setItem("ymt_banned", "true");
                alert("Gesperrt & gelöscht!");
                checkBanStatus();
            }
        }

        function ignoreReport(videoId) {
            db.ref(`loops/${videoId}`).update({ reported: false });
        }

        function openModal(id) { document.getElementById(id).style.display = "flex"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        function escapeHtml(text) {
            return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';
        }

        loadFeed();
    </script>
</body>
</html>
