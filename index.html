<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ymt Loops</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Firebase Firestore SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(22, 24, 34, 0.7);
            --accent-color: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --danger-color: #ff3366;
            --text-color: #f0f2f5;
            --verified-color: #00d2ff;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a1c2e 0%, #0b0c10 70%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #00ff88, #00d2ff);
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 0.9rem;
            font-weight: 900;
            -webkit-text-fill-color: initial;
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 12, 16, 0.8);
            backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff88, #00c868);
            color: #000;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
        }

        .btn-danger {
            background: var(--danger-color);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        main {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .loop-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .video-container {
            width: 100%;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            max-height: 500px;
            display: block;
            object-fit: cover;
        }

        .loop-info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .loop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loop-author {
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #aaa;
        }

        .verified-badge {
            color: var(--verified-color);
            font-size: 1.1rem;
        }

        .loop-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .like-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 14px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #161822;
            padding: 28px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .modal-content h2 {
            font-size: 1.4rem;
            font-weight: 800;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        #ban-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: #0b0000;
            color: var(--danger-color);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .admin-panel {
            background: rgba(255, 51, 102, 0.05);
            border: 1px solid var(--danger-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: none;
        }

        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
        }

        .toast {
            background: rgba(22, 24, 34, 0.95);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px 18px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.success { border-color: var(--accent-color); }
        .toast.error { border-color: var(--danger-color); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(20px); }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="ban-overlay">
        <h1 style="font-size: 2rem; font-weight: 900;">🚫 GEBANNT</h1>
        <p style="margin-top: 10px; color: #aaa;">Dieses Gerät wurde dauerhaft gesperrt.</p>
    </div>

    <div id="onboarding-modal" class="modal">
        <div class="modal-content">
            <div class="logo">
                <span class="logo-icon">∞</span> ymt Loops
            </div>
            <h2>Willkommen!</h2>
            <p style="font-size: 0.85rem; color: #aaa;">Wähle deinen Usernamen. Er wird lokal auf deinem Gerät gespeichert.</p>
            <input type="text" id="setup-username" placeholder="z. B. ymtmanuel...">
            <button class="btn-primary" onclick="registerUser()">Starten</button>
        </div>
    </div>

    <header>
        <div class="logo">
            <span class="logo-icon">∞</span> ymt Loops
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <span id="current-user-display" style="font-size: 0.85rem; color: #aaa; font-weight: 600;"></span>
            <button class="btn-primary" onclick="openModal('upload-modal')">+ Upload</button>
            <button id="admin-btn" class="btn-secondary" style="display:none;" onclick="toggleAdmin()">Admin</button>
        </div>
    </header>

    <main>
        <div id="admin-panel" class="admin-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="color: var(--danger-color); font-weight:bold;">🛡️ Admin Panel</span>
                <button class="btn-secondary" style="padding: 4px 10px;" onclick="toggleAdmin()">Schließen</button>
            </div>
            <p style="font-size: 0.85rem; color: #ccc; margin-bottom: 10px;">Gemeldete Videos verwalten und Täter bannen:</p>
            <div id="reported-list"></div>
        </div>

        <div id="feed">
            <p style="text-align: center; color: #666; margin-top: 40px;">Lade Loops...</p>
        </div>
    </main>

    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <h2>Neuer Loop</h2>
            <p style="font-size: 0.8rem; color: #aaa;">Maximal 2 Minuten 10 Sekunden (130s)</p>
            <input type="text" id="video-title" placeholder="Titel des Loops...">
            <input type="file" id="video-file" accept="video/*">
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
                <button class="btn-secondary" onclick="closeModal('upload-modal')">Abbrechen</button>
                <button class="btn-primary" onclick="uploadVideo()">Hochladen</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBCFpS0xDeHl9EteigBUQq6nI2MCgyyoa8",
            authDomain: "pigeon-1e2cd.firebaseapp.com",
            projectId: "pigeon-1e2cd",
            storageBucket: "pigeon-1e2cd.firebasestorage.app",
            messagingSenderId: "538627864447",
            appId: "1:538627864447:web:8f917799e135b889bd4c4a",
            measurementId: "G-0F13EEQ4EQ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = localStorage.getItem("ymt_username") || "";

        function showToast(message, type = "normal") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function checkBanStatus() {
            if (localStorage.getItem("ymt_banned") === "true") {
                document.getElementById("ban-overlay").style.display = "flex";
            }
        }
        checkBanStatus();

        function initUserSystem() {
            if (!currentUser) {
                openModal('onboarding-modal');
            } else {
                updateUserUI();
            }
        }

        function updateUserUI() {
            document.getElementById("current-user-display").innerText = `@${currentUser}`;
            if (currentUser === "ymtmanuel") {
                document.getElementById("admin-btn").style.display = "inline-block";
            }
        }

        async function registerUser() {
            const input = document.getElementById("setup-username").value.trim().toLowerCase();
            if (!input) {
                showToast("Bitte gib einen Namen ein!", "error");
                return;
            }

            const doc = await db.collection("usernames").doc(input).get();

            if (doc.exists) {
                showToast("🚫 Dieser Username ist bereits vergeben!", "error");
                return;
            }

            await db.collection("usernames").doc(input).set({ registeredAt: Date.now() });
            localStorage.setItem("ymt_username", input);
            currentUser = input;

            closeModal('onboarding-modal');
            updateUserUI();
            showToast(`Willkommen, @${currentUser}! 🎉`, "success");
        }

        function loadFeed() {
            const feedContainer = document.getElementById("feed");
            db.collection("loops").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                feedContainer.innerHTML = "";
                if (snapshot.empty) {
                    feedContainer.innerHTML = '<p style="text-align: center; color: #666; margin-top: 40px;">Noch keine Loops da. Sei der Erste!</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const likes = data.likes || 0;
                    const isVerified = (data.username === "ymtmanuel");
                    const badge = isVerified ? '<span class="verified-badge" title="Verifiziert">☑️</span>' : '';

                    const card = document.createElement("div");
                    card.className = "loop-card";
                    card.innerHTML = `
                        <div class="video-container">
                            <video src="${data.url}" controls loop playsinline></video>
                        </div>
                        <div class="loop-info">
                            <div class="loop-header">
                                <span class="loop-author">@${escapeHtml(data.username || 'Anonym')} ${badge}</span>
                            </div>
                            <div class="loop-title">${escapeHtml(data.title)}</div>
                            <div class="actions">
                                <button class="like-btn" onclick="likeVideo('${doc.id}', ${likes})">
                                    ❤️ <span>${likes}</span>
                                </button>
                                <button class="btn-secondary" style="padding: 6px 12px; font-size: 0.8rem;" onclick="reportVideo('${doc.id}')">🚩 Melden</button>
                            </div>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            });
        }

        async function likeVideo(videoId, currentLikes) {
            await db.collection("loops").doc(videoId).update({ likes: currentLikes + 1 });
        }

        async function uploadVideo() {
            const titleInput = document.getElementById("video-title");
            const fileInput = document.getElementById("video-file");
            const rawTitle = titleInput.value.trim();

            if (!rawTitle || !fileInput.files[0]) {
                showToast("Bitte Titel und Video auswählen!", "error");
                return;
            }

            const file = fileInput.files[0];
            const videoElement = document.createElement('video');
            videoElement.preload = 'metadata';
            videoElement.src = URL.createObjectURL(file);

            videoElement.onloadedmetadata = async function() {
                window.URL.revokeObjectURL(videoElement.src);

                if (videoElement.duration > 130) {
                    showToast("🚫 Video ist länger als 2 Min. 10 Sek.", "error");
                    return;
                }

                showToast("Verarbeite Video...", "normal");

                const reader = new FileReader();
                reader.onload = async function(e) {
                    const videoBase64 = e.target.result;

                    await db.collection("loops").add({
                        username: currentUser,
                        title: rawTitle,
                        url: videoBase64,
                        likes: 0,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        reported: false
                    });

                    showToast("Loop erfolgreich hochgeladen! 🚀", "success");
                    closeModal('upload-modal');
                    titleInput.value = "";
                    fileInput.value = "";
                };

                reader.readAsDataURL(file);
            };
        }

        async function reportVideo(videoId) {
            await db.collection("loops").doc(videoId).update({ reported: true });
            showToast("Video wurde an ymtmanuel gemeldet.", "normal");
        }

        function toggleAdmin() {
            const panel = document.getElementById("admin-panel");
            if (panel.style.display === "block") {
                panel.style.display = "none";
            } else {
                panel.style.display = "block";
                loadReportedVideos();
            }
        }

        function loadReportedVideos() {
            const list = document.getElementById("reported-list");
            db.collection("loops").where("reported", "==", true).onSnapshot(snapshot => {
                list.innerHTML = "";
                if (snapshot.empty) {
                    list.innerHTML = '<p style="font-size:0.85rem; color:#aaa;">Keine gemeldeten Videos.</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const item = document.createElement("div");
                    item.style.cssText = "background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border-color);";
                    item.innerHTML = `
                        <p><strong>@${escapeHtml(data.username)}</strong>: ${escapeHtml(data.title)}</p>
                        <div style="margin-top: 8px; display:flex; gap:8px;">
                            <button class="btn-danger" style="padding: 6px 12px; font-size: 0.8rem;" onclick="banAndDelete('${doc.id}', '${data.username}')">Löschen & Bannen</button>
                            <button class="btn-secondary" style="padding: 6px 12px; font-size: 0.8rem;" onclick="ignoreReport('${doc.id}')">Ignorieren</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        async function banAndDelete(videoId, usernameToFree) {
            await db.collection("loops").doc(videoId).delete();
            if (usernameToFree) {
                await db.collection("usernames").doc(usernameToFree).delete();
            }

            if (currentUser === usernameToFree) {
                localStorage.setItem("ymt_banned", "true");
                checkBanStatus();
            }

            showToast("Video gelöscht und User gebannt!", "success");
        }

        async function ignoreReport(videoId) {
            await db.collection("loops").doc(videoId).update({ reported: false });
            showToast("Meldung verworfen.", "normal");
        }

        function openModal(id) { document.getElementById(id).style.display = "flex"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        function escapeHtml(text) {
            return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';
        }

        initUserSystem();
        loadFeed();
    </script>
</body>
</html>
