<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ymt Loops & Posts</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Firebase Firestore SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(22, 24, 34, 0.7);
            --accent-color: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --danger-color: #ff3366;
            --text-color: #f0f2f5;
            --verified-color: #00d2ff;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a1c2e 0%, #0b0c10 70%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #00ff88, #00d2ff);
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 0.9rem;
            font-weight: 900;
            -webkit-text-fill-color: initial;
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 12, 16, 0.8);
            backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff88, #00c868);
            color: #000;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-danger {
            background: var(--danger-color);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        main {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .loop-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .media-container {
            width: 100%;
            background: #000;
            position: relative;
        }

        video, img.post-img {
            width: 100%;
            max-height: 500px;
            display: block;
            object-fit: contain;
        }

        .loop-info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .loop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loop-author {
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #aaa;
        }

        .verified-badge {
            color: var(--verified-color);
            font-size: 1.1rem;
        }

        .loop-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .like-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 14px;
        }

        .like-btn.liked {
            background: rgba(255, 51, 102, 0.2);
            border-color: var(--danger-color);
            color: var(--danger-color);
        }

        .comments-section {
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            margin-top: 6px;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 180px;
            overflow-y: auto;
        }

        .comment-item {
            font-size: 0.85rem;
            background: rgba(0,0,0,0.25);
            padding: 6px 10px;
            border-radius: 8px;
            word-break: break-word;
        }

        .comment-user {
            color: var(--accent-color);
            font-weight: 600;
            margin-right: 6px;
        }

        .comment-input-box {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .comment-input-box input {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #161822;
            padding: 28px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        #ban-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: #0b0000;
            color: var(--danger-color);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .admin-panel {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid var(--accent-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: none;
        }

        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
        }

        .toast {
            background: rgba(22, 24, 34, 0.95);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px 18px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
        }

        .toast.success { border-color: var(--accent-color); }
        .toast.error { border-color: var(--danger-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(20px); } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="ban-overlay">
        <h1 style="font-size: 2rem; font-weight: 900;">🚫 GEBANNT</h1>
        <p style="margin-top: 10px; color: #aaa;">Dieses Gerät wurde gesperrt.</p>
    </div>

    <div id="onboarding-modal" class="modal">
        <div class="modal-content">
            <div class="logo"><span class="logo-icon">∞</span> ymt Loops</div>
            <h2>Willkommen!</h2>
            <p style="font-size: 0.85rem; color: #aaa;">Wähle deinen Usernamen:</p>
            <input type="text" id="setup-username" placeholder="z. B. ymtmanuel...">
            <button class="btn-primary" onclick="registerUser()">Starten</button>
        </div>
    </div>

    <header>
        <div class="logo"><span class="logo-icon">∞</span> ymt Loops</div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <span id="current-user-display" style="font-size: 0.85rem; color: #aaa; font-weight: 600;"></span>
            <button class="btn-primary" onclick="openModal('upload-modal')">+ Posten</button>
            <button id="admin-btn" class="btn-secondary" style="display:none;" onclick="toggleAdmin()">Admin 🛡️</button>
        </div>
    </header>

    <main>
        <!-- ADMIN MODERATIONSPANEL -->
        <div id="admin-panel" class="admin-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <span style="color: var(--accent-color); font-weight:bold;">🛡️ Admin-Freigabe (Pending Posts)</span>
                <button class="btn-secondary" style="padding: 4px 10px;" onclick="toggleAdmin()">Schließen</button>
            </div>
            <div id="pending-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
        </div>

        <div id="feed">
            <p style="text-align: center; color: #666; margin-top: 40px;">Lade Posts...</p>
        </div>
    </main>

    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <h2>Neuer Post</h2>
            <p style="font-size: 0.8rem; color: #aaa;">Uploads werden vor Veröffentlichung vom Admin geprüft.</p>
            <input type="text" id="video-title" placeholder="Titel / Beschreibung...">
            <input type="file" id="video-file" accept="image/*,video/*">
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
                <button class="btn-secondary" onclick="closeModal('upload-modal')">Abbrechen</button>
                <button class="btn-primary" onclick="uploadMedia()">Hochladen</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBCFpS0xDeHl9EteigBUQq6nI2MCgyyoa8",
            authDomain: "pigeon-1e2cd.firebaseapp.com",
            projectId: "pigeon-1e2cd",
            storageBucket: "pigeon-1e2cd.firebasestorage.app",
            messagingSenderId: "538627864447",
            appId: "1:538627864447:web:8f917799e135b889bd4c4a",
            measurementId: "G-0F13EEQ4EQ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = localStorage.getItem("ymt_username") || "";

        function showToast(message, type = "normal") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function checkBanStatus() {
            if (localStorage.getItem("ymt_banned") === "true") {
                document.getElementById("ban-overlay").style.display = "flex";
            }
        }
        checkBanStatus();

        function initUserSystem() {
            if (!currentUser) openModal('onboarding-modal');
            else updateUserUI();
        }

        function updateUserUI() {
            document.getElementById("current-user-display").innerText = `@${currentUser}`;
            if (currentUser === "ymtmanuel") {
                document.getElementById("admin-btn").style.display = "inline-block";
            }
        }

        async function registerUser() {
            const input = document.getElementById("setup-username").value.trim().toLowerCase();
            if (!input) return showToast("Bitte Username eingeben!", "error");

            const doc = await db.collection("usernames").doc(input).get();
            if (doc.exists) return showToast("Username vergeben!", "error");

            await db.collection("usernames").doc(input).set({ registeredAt: Date.now() });
            localStorage.setItem("ymt_username", input);
            currentUser = input;
            closeModal('onboarding-modal');
            updateUserUI();
            showToast(`Willkommen, @${currentUser}! 🎉`, "success");
        }

        // FEEDS LADEN (NUR 'approved' POSTS ZEIGEN)
        function loadFeed() {
            const feedContainer = document.getElementById("feed");
            db.collection("loops")
              .where("status", "==", "approved")
              .orderBy("timestamp", "desc")
              .onSnapshot(snapshot => {
                feedContainer.innerHTML = "";
                if (snapshot.empty) {
                    feedContainer.innerHTML = '<p style="text-align: center; color: #666; margin-top: 40px;">Noch keine Posts da.</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const likesList = data.likesList || [];
                    const hasLiked = likesList.includes(currentUser);
                    const comments = data.comments || [];
                    const isVerified = (data.username === "ymtmanuel");
                    const badge = isVerified ? '<span class="verified-badge">☑️</span>' : '';
                    const isVideo = data.type === "video";

                    const commentsHtml = comments.map(c => 
                        `<div class="comment-item"><span class="comment-user">@${escapeHtml(c.user)}:</span>${escapeHtml(c.text)}</div>`
                    ).join('');

                    const mediaElement = isVideo 
                        ? `<video src="${data.url}" controls loop playsinline></video>`
                        : `<img src="${data.url}" class="post-img" alt="Foto" />`;

                    const card = document.createElement("div");
                    card.className = "loop-card";
                    card.innerHTML = `
                        <div class="media-container">${mediaElement}</div>
                        <div class="loop-info">
                            <div class="loop-header">
                                <span class="loop-author">@${escapeHtml(data.username || 'Anonym')} ${badge}</span>
                            </div>
                            <div class="loop-title">${escapeHtml(data.title)}</div>
                            <div class="actions">
                                <button class="like-btn ${hasLiked ? 'liked' : ''}" onclick="toggleLike('${doc.id}')">
                                    ❤️ <span>${likesList.length}</span>
                                </button>
                                <button class="btn-secondary" style="padding: 6px 12px; font-size: 0.8rem;" onclick="toggleComments('${doc.id}')">
                                    💬 ${comments.length}
                                </button>
                            </div>
                            <div class="comments-section" id="comments-${doc.id}">
                                <div class="comment-list">${commentsHtml.length ? commentsHtml : '<p style="font-size:0.8rem; color:#666;">Keine Kommentare</p>'}</div>
                                <div class="comment-input-box">
                                    <input type="text" id="cmt-input-${doc.id}" placeholder="Kommentar schreiben...">
                                    <button class="btn-primary" style="padding: 6px 12px; font-size: 0.8rem;" onclick="addComment('${doc.id}')">Send</button>
                                </div>
                            </div>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            });
        }

        async function toggleLike(docId) {
            if (!currentUser) return showToast("Bitte erst anmelden!", "error");
            const docRef = db.collection("loops").doc(docId);
            const doc = await docRef.get();
            if (!doc.exists) return;

            const likesList = doc.data().likesList || [];
            if (likesList.includes(currentUser)) {
                await docRef.update({
                    likesList: firebase.firestore.FieldValue.arrayRemove(currentUser)
                });
            } else {
                await docRef.update({
                    likesList: firebase.firestore.FieldValue.arrayUnion(currentUser)
                });
            }
        }

        function toggleComments(docId) {
            const box = document.getElementById(`comments-${docId}`);
            box.style.display = (box.style.display === "flex") ? "none" : "flex";
        }

        async function addComment(docId) {
            const input = document.getElementById(`cmt-input-${docId}`);
            const text = input.value.trim();
            if (!text) return;

            const newComment = {
                user: currentUser || "Anonym",
                text: text,
                time: Date.now()
            };

            await db.collection("loops").doc(docId).update({
                comments: firebase.firestore.FieldValue.arrayUnion(newComment)
            });

            input.value = "";
            showToast("Gepostet! 💬", "success");
        }

        async function uploadMedia() {
            const titleInput = document.getElementById("video-title");
            const fileInput = document.getElementById("video-file");
            const rawTitle = titleInput.value.trim();

            if (!rawTitle || !fileInput.files[0]) {
                return showToast("Titel und Datei auswählen!", "error");
            }

            const file = fileInput.files[0];
            const isVideo = file.type.startsWith('video/');
            const isImage = file.type.startsWith('image/');

            if (!isVideo && !isImage) {
                return showToast("Bitte nur Bilder oder Videos hochladen!", "error");
            }

            showToast("Wird verarbeitet...", "normal");

            if (isImage) {
                compressImage(file, 1024, 0.7, async (base64Data) => {
                    await saveToFirestore(rawTitle, base64Data, "image");
                });
            } else {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const base64Data = e.target.result;
                    if (base64Data.length > 1048576) {
                        return showToast("🚫 Video ist zu groß für Firestore!", "error");
                    }
                    await saveToFirestore(rawTitle, base64Data, "video");
                };
                reader.readAsDataURL(file);
            }
        }

        function compressImage(file, maxWidth, quality, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement("canvas");
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL("image/jpeg", quality);
                    callback(dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // POST ALS 'pending' SPEICHERN (Manuel muss erst akzeptieren)
        async function saveToFirestore(title, url, type) {
            try {
                // Wenn du selbst postest, wird es direkt freigeschaltet. Bei allen anderen geht es in 'pending'.
                const initialStatus = (currentUser === "ymtmanuel") ? "approved" : "pending";

                await db.collection("loops").add({
                    username: currentUser,
                    title: title,
                    url: url,
                    type: type,
                    likesList: [],
                    comments: [],
                    status: initialStatus,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                if (initialStatus === "approved") {
                    showToast("Dein Post wurde direkt veröffentlicht! 🚀", "success");
                } else {
                    showToast("Post eingereicht! Wartet auf Admin-Freigabe ⏳", "success");
                }

                closeModal('upload-modal');
                document.getElementById("video-title").value = "";
                document.getElementById("video-file").value = "";
            } catch (err) {
                showToast("Fehler beim Speichern!", "error");
            }
        }

        function toggleAdmin() {
            const panel = document.getElementById("admin-panel");
            panel.style.display = panel.style.display === "block" ? "none" : "block";
            if (panel.style.display === "block") loadPendingPosts();
        }

        // LÄDT ALLE UPLOADS, DIE AUF DIE FREIGABE WARTEN
        function loadPendingPosts() {
            const list = document.getElementById("pending-list");
            db.collection("loops").where("status", "==", "pending").onSnapshot(snapshot => {
                list.innerHTML = snapshot.empty ? '<p style="font-size:0.85rem; color:#aaa;">Keine ausstehenden Posts. Alles sauber! 👍</p>' : '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isVideo = data.type === "video";
                    const mediaPreview = isVideo 
                        ? `<video src="${data.url}" controls style="max-height: 150px; border-radius: 8px;"></video>`
                        : `<img src="${data.url}" style="max-height: 150px; border-radius: 8px; object-fit: contain;" />`;

                    const item = document.createElement("div");
                    item.style.cssText = "background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); display:flex; flex-direction:column; gap:8px;";
                    item.innerHTML = `
                        <div><strong>@${escapeHtml(data.username)}</strong>: ${escapeHtml(data.title)}</div>
                        <div>${mediaPreview}</div>
                        <div style="display:flex; gap:8px; margin-top: 4px;">
                            <button class="btn-primary" style="padding: 6px 12px; font-size: 0.8rem;" onclick="approvePost('${doc.id}')">Freigeben ✅</button>
                            <button class="btn-danger" style="padding: 6px 12px; font-size: 0.8rem;" onclick="rejectPost('${doc.id}')">Ablehnen ❌</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        // ADMIN-AKTIONEN
        async function approvePost(docId) {
            await db.collection("loops").doc(docId).update({ status: "approved" });
            showToast("Beitrag freigegeben! 🎉", "success");
        }

        async function rejectPost(docId) {
            await db.collection("loops").doc(docId).delete();
            showToast("Beitrag abgelehnt und gelöscht.", "normal");
        }

        function openModal(id) { document.getElementById(id).style.display = "flex"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        function escapeHtml(text) { return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ''; }

        initUserSystem();
        loadFeed();
    </script>
</body>
</html>
