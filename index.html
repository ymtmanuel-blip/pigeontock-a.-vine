<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sichere Video & Foto App</title>

    <!-- TensorFlow.js & NSFW Model (KI Scanner) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nsfwjs@2.4.1/dist/nsfwjs.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        header {
            width: 100%;
            padding: 15px 20px;
            background: #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 1.2rem;
            color: #00ff88;
        }

        .btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:disabled {
            cursor: not-allowed;
        }

        #feed {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px 10px;
        }

        .card {
            background: #1f1f1f;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .card-header {
            padding: 10px 15px;
            font-weight: bold;
            border-bottom: 1px solid #2a2a2a;
        }

        .card-body media, .card-body img, .card-body video {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            display: block;
            background: #000;
        }

        .card-footer {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .like-btn {
            background: transparent;
            border: 1px solid #444;
            color: #fff;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
        }

        .like-btn.liked {
            background: #ff3366;
            border-color: #ff3366;
        }

        /* Modal / Dialog */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1f1f1f;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
        }

        /* Toast Benachrichtigung */
        #toast {
            position: fixed;
            bottom: 20px;
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
            z-index: 2000;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header>
        <h1>SecureMedia</h1>
        <button class="btn" onclick="openModal()">+ Hochladen</button>
    </header>

    <div id="feed">
        <!-- Beiträge werden hier geladen -->
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <h3>Neuer Beitrag</h3>
            <input type="text" id="video-title" placeholder="Titel eingeben...">
            <input type="file" id="video-file" accept="image/*,video/*" onchange="checkFileSize()">
            
            <!-- Speicherplatz-Balken -->
            <div id="size-meter" style="display: none;">
                <div style="height: 8px; background: #333; border-radius: 4px; overflow: hidden;">
                    <div id="progress-fill" style="height: 100%; width: 0%; transition: width 0.3s; background: #00ff88;"></div>
                </div>
                <p id="size-text" style="font-size: 0.75rem; color: #aaa; margin-top: 5px;"></p>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
                <button class="btn" style="background: #444; color: #fff;" onclick="closeModal()">Abbrechen</button>
                <button class="btn btn-primary" onclick="uploadMedia()">Hochladen</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let nsfwModel = null;
        let userId = localStorage.getItem("userId") || "user_" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("userId", userId);

        // Lokaler Speicher-Ersatz für Demo-Zwecke (kannst du an dein Firebase / Backend anpassen)
        let posts = JSON.parse(localStorage.getItem("app_posts") || "[]");

        // KI-Modell beim Start laden
        nsfwjs.load().then(model => {
            nsfwModel = model;
            console.log("KI-Modell erfolgreich geladen.");
        });

        document.addEventListener("DOMContentLoaded", renderPosts);

        function openModal() {
            document.getElementById("upload-modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("upload-modal").style.display = "none";
            document.getElementById("video-title").value = "";
            document.getElementById("video-file").value = "";
            document.getElementById("size-meter").style.display = "none";
        }

        function showToast(text, type = "normal") {
            const toast = document.getElementById("toast");
            toast.innerText = text;
            toast.style.display = "block";
            toast.style.background = type === "error" ? "#ff3366" : "#333";
            setTimeout(() => { toast.style.display = "none"; }, 3500);
        }

        // Live-Größen-Check
        function checkFileSize() {
            const fileInput = document.getElementById("video-file");
            const meter = document.getElementById("size-meter");
            const fill = document.getElementById("progress-fill");
            const text = document.getElementById("size-text");
            const uploadBtn = document.querySelector("#upload-modal .btn-primary");

            if (fileInput.files.length === 0) {
                meter.style.display = "none";
                return;
            }

            const file = fileInput.files[0];
            const sizeInMB = file.size / (1024 * 1024);
            const limit = 2.5; // Maximal 2.5 MB erlaubt
            const percentage = Math.min((sizeInMB / limit) * 100, 100);

            meter.style.display = "block";
            fill.style.width = percentage + "%";
            text.innerText = `Größe: ${sizeInMB.toFixed(2)} MB / ${limit} MB max`;

            if (sizeInMB > limit) {
                fill.style.background = "#ff3366"; // Rot
                text.style.color = "#ff3366";
                uploadBtn.disabled = true;
                uploadBtn.style.opacity = "0.3";
            } else if (sizeInMB > 1.8) {
                fill.style.background = "#ffcc00"; // Gelb
                text.style.color = "#ffcc00";
                uploadBtn.disabled = false;
                uploadBtn.style.opacity = "1";
            } else {
                fill.style.background = "#00ff88"; // Grün
                text.style.color = "#00ff88";
                uploadBtn.disabled = false;
                uploadBtn.style.opacity = "1";
            }
        }

        // Hauptfunktion für den Upload & KI-Scan
        async function uploadMedia() {
            const titleInput = document.getElementById("video-title");
            const fileInput = document.getElementById("video-file");
            const rawTitle = titleInput.value.trim();

            if (!rawTitle || !fileInput.files[0]) return showToast("Titel und Datei auswählen!", "error");
            if (!nsfwModel) return showToast("KI lädt noch, bitte kurz warten...", "error");

            const file = fileInput.files[0];
            const isVideo = file.type.startsWith('video/');
            const isImage = file.type.startsWith('image/');

            if (!isVideo && !isImage) return showToast("Bitte nur Bilder oder Videos hochladen!", "error");

            showToast("KI scannt Inhalt (kann kurz dauern)...");

            // 1. FOTO SCAN
            if (isImage) {
                compressImage(file, 800, 0.6, async (base64Data) => {
                    const img = new Image();
                    img.src = base64Data;
                    img.onload = async () => {
                        const predictions = await nsfwModel.classify(img);
                        if (isUnsafe(predictions)) return showToast("🚫 Bild blockiert (Sicherheitsverstoß)!", "error");
                        savePost(rawTitle, base64Data, "image");
                    };
                });
            } 
            // 2. VIDEO SCAN (Alle 3 Sekunden ein Frame)
            else {
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                video.muted = true;
                video.load();

                video.onloadedmetadata = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 320;
                    canvas.height = 240;
                    const ctx = canvas.getContext('2d');
                    let isSafe = true;

                    for (let time = 0; time < video.duration; time += 3) {
                        video.currentTime = time;
                        await new Promise(r => video.onseeked = r);
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        const frameData = canvas.toDataURL('image/jpeg');
                        const img = new Image();
                        img.src = frameData;
                        await new Promise(r => img.onload = r);

                        const predictions = await nsfwModel.classify(img);
                        if (isUnsafe(predictions)) {
                            isSafe = false;
                            break;
                        }
                    }

                    if (!isSafe) {
                        showToast("🚫 Video blockiert (Sicherheitsverstoß)!", "error");
                    } else {
                        const reader = new FileReader();
                        reader.onload = async (e) => {
                            savePost(rawTitle, e.target.result, "video");
                        };
                        reader.readAsDataURL(file);
                    }
                };
            }
        }

        // Hilfsfunktion KI Check
        function isUnsafe(predictions) {
            return predictions.some(p => 
                (p.className === 'Porn' || p.className === 'Hentai' || p.className === 'Sexy') && p.probability > 0.65
            );
        }

        // Bild-Komprimierung
        function compressImage(file, maxWidth, quality, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', quality));
                };
            };
        }

        // Beitrag speichern
        function savePost(title, dataUrl, type) {
            const newPost = {
                id: "post_" + Date.now(),
                title: title,
                src: dataUrl,
                type: type,
                likes: []
            };

            posts.unshift(newPost);
            localStorage.setItem("app_posts", JSON.stringify(posts));
            closeModal();
            showToast("Erfolgreich hochgeladen!");
            renderPosts();
        }

        // 1-Like-System Logik
        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;

            const index = post.likes.indexOf(userId);
            if (index === -1) {
                post.likes.push(userId); // Like hinzufügen
            } else {
                post.likes.splice(index, 1); // Like entfernen (Toggle)
            }

            localStorage.setItem("app_posts", JSON.stringify(posts));
            renderPosts();
        }

        // Feed anzeigen
        function renderPosts() {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";

            if (posts.length === 0) {
                feed.innerHTML = "<p style='text-align: center; color: #666; margin-top: 40px;'>Noch keine Beiträge vorhanden.</p>";
                return;
            }

            posts.forEach(post => {
                const isLiked = post.likes.includes(userId);
                const card = document.createElement("div");
                card.className = "card";

                let mediaHtml = post.type === "video" 
                    ? `<video src="${post.src}" controls></video>`
                    : `<img src="${post.src}" alt="Beitrag">`;

                card.innerHTML = `
                    <div class="card-header">${post.title}</div>
                    <div class="card-body">${mediaHtml}</div>
                    <div class="card-footer">
                        <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                            ❤️ ${post.likes.length}
                        </button>
                    </div>
                `;
                feed.appendChild(card);
            });
        }
    </script>
</body>
</html>
