<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PigVin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .slide { height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="feed" class="feed">
        <!-- Videos landen hier -->
    </div>

    <!-- Upload Button -->
    <button onclick="document.getElementById('video-input').click()" 
            class="fixed bottom-20 right-5 bg-white text-black p-4 rounded-full font-bold z-50">
        +
    </button>
    <input type="file" id="video-input" class="hidden" accept="video/*">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCFpS0xDeHl9EteigBUQq6nI2MCgyyoa8",
            projectId: "pigeon-1e2cd",
            storageBucket: "pigeon-1e2cd.firebasestorage.app",
            appId: "1:538627864447:web:6453978db81aeb5fbd4c4a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Videos laden
        async function loadFeed() {
            const feed = document.getElementById('feed');
            const q = query(collection(db, "videos"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            
            feed.innerHTML = "";
            snap.forEach((doc) => {
                const vid = document.createElement('div');
                vid.className = 'slide';
                vid.innerHTML = `<video src="${doc.data().url}" autoplay loop muted playsinline></video>`;
                feed.appendChild(vid);
            });
        }

        // Upload
        document.getElementById('video-input').onchange = async (e) => {
            const file = e.target.files[0];
            const storageRef = ref(storage, 'videos/' + Date.now());
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            await addDoc(collection(db, "videos"), { url: url, timestamp: new Date() });
            loadFeed();
        };

        loadFeed();
    </script>
</body>
</html>
