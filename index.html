<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PigVin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; overflow: hidden; }

        /* Feed */
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .slide { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }

        /* Maintenance Overlay */
        .maintenance-overlay {
            position: fixed; inset: 0; z-index: 1000; display: none;
            background-color: #FFD700;
            background-image: repeating-linear-gradient(45deg, #000 0, #000 20px, #FFD700 20px, #FFD700 40px);
            justify-content: center; align-items: center;
        }
        .maintenance-text { font-size: 3rem; font-weight: bold; color: #000; text-transform: uppercase; }

        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-icon { width: 28px; height: 28px; fill: #fff; cursor: pointer; }
        .plus-btn { background: #fff; color: #000; width: 45px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; cursor: pointer; }

        /* Sidebar */
        .sidebar { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 50; }
        .action-btn { font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="maintenance-screen" class="maintenance-overlay">
        <div class="maintenance-text">Maintenance</div>
    </div>

    <div id="feed" class="feed">
        <div class="slide"></div>
    </div>

    <div class="sidebar">
        <div class="action-btn" onclick="alert('Like!')">♥</div>
        <div class="action-btn" onclick="alert('Kommentar!')">💬</div>
        <div class="action-btn" onclick="alert('Sticker!')">✨</div>
    </div>

    <nav class="bottom-nav">
        <svg class="nav-icon" onclick="window.location.reload()" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="nav-icon" onclick="alert('Suche')" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5z"/></svg>
        <div class="plus-btn" onclick="document.getElementById('video-input').click()">+</div>
        <svg class="nav-icon" onclick="document.getElementById('admin-panel').style.display='block'" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </nav>

    <div id="admin-panel" style="display:none; position:fixed; inset:0; background:#000; z-index:200; padding:20px;">
        <h2 class="text-xl font-bold">Admin Panel (ymtmanuel)</h2>
        <button onclick="this.parentElement.style.display='none'" class="mt-4 text-zinc-500">Schließen</button>
        <button onclick="document.getElementById('maintenance-screen').style.display='flex'" class="w-full mt-4 bg-red-600 p-3 rounded">Wartung An</button>
        <button onclick="document.getElementById('maintenance-screen').style.display='none'" class="w-full mt-4 bg-green-600 p-3 rounded">Wartung Aus</button>
    </div>

    <input type="file" id="video-input" class="hidden" accept="video/*">

    <script>
        document.getElementById('video-input').onchange = (e) => {
            const file = e.target.files[0];
            const video = document.createElement('video');
            video.preload = 'metadata';
            video.onloadedmetadata = function() {
                if (this.duration > 6.1) {
                    alert("Achtung: Video zu lang! Max 6 Sekunden.");
                } else {
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    const vid = document.createElement('video');
                    vid.src = URL.createObjectURL(file);
                    vid.autoplay = true; vid.loop = true; vid.muted = true;
                    slide.appendChild(vid);
                    document.getElementById('feed').appendChild(slide);
                }
            };
            video.src = URL.createObjectURL(file);
        };
    </script>
</body>
</html>
