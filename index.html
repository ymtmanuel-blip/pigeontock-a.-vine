<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PigVin | V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e5e5e5; font-family: sans-serif; overflow: hidden; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .slide { height: 100vh; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <!-- Feed -->
    <div id="feed" class="feed"></div>

    <!-- Admin Panel Button (Nur für dich sichtbar machen) -->
    <button onclick="document.getElementById('admin').classList.toggle('hidden')" 
            class="fixed top-5 left-5 z-50 p-2 glass rounded-lg text-xs">ADMIN</button>

    <!-- Admin Panel -->
    <div id="admin" class="hidden fixed inset-0 z-50 bg-black p-10 overflow-y-auto">
        <h2 class="text-2xl font-bold mb-5">Admin Dashboard - Meldungen</h2>
        <div id="report-list"></div>
        <button onclick="this.parentElement.classList.add('hidden')" class="mt-5 p-2 bg-red-900">Schließen</button>
    </div>

    <!-- Upload Overlay -->
    <div class="fixed bottom-24 right-5 z-40">
        <button onclick="document.getElementById('video-input').click()" 
                class="w-14 h-14 bg-white text-black rounded-full text-2xl font-bold">+</button>
    </div>
    <input type="file" id="video-input" class="hidden" accept="video/*">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // ... (Hier deine Config einfügen) ...

        // Lade Feed Funktion
        async function loadFeed() {
            const snap = await getDocs(collection(db, "videos"));
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'slide';
                div.innerHTML = `
                    <video src="${data.url}" autoplay loop muted playsinline></video>
                    <button onclick="reportVideo('${doc.id}')" class="absolute top-5 right-5 text-3xl">⚠️</button>
                `;
                feed.appendChild(div);
            });
        }

        // Melden Funktion
        window.reportVideo = async (id) => {
            await updateDoc(doc(db, "videos", id), { reported: true });
            alert("Video gemeldet.");
        };

        loadFeed();
    </script>
</body>
</html>
