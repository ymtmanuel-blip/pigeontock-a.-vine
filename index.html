<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ymt Loops & Posts</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Firebase App (Core) SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <!-- Firebase Firestore SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(22, 24, 34, 0.85);
            --accent-color: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --danger-color: #ff3366;
            --text-color: #f0f2f5;
            --verified-color: #00d2ff;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        header {
            width: 100%;
            max-width: 500px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(11,12,16,0.9), transparent);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #00ff88, #00d2ff);
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 0.8rem;
            font-weight: 900;
            -webkit-text-fill-color: initial;
        }

        /* Views management */
        .app-view {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            margin: 0 auto;
            display: none;
            padding-bottom: 70px;
            overflow-y: auto;
        }

        .app-view.active {
            display: block;
        }

        /* Feed Tab */
        #feed-view {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }

        .loop-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .media-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0c10;
            z-index: 1;
        }

        video, img.post-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .loop-info {
            position: relative;
            z-index: 2;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 90px;
        }

        .loop-author {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .verified-badge { color: var(--verified-color); font-size: 1rem; }
        .loop-title { font-size: 0.95rem; color: #f0f2f5; text-shadow: 0 1px 3px rgba(0,0,0,0.8); line-height: 1.3; }

        .actions-right {
            position: absolute;
            right: 16px;
            bottom: 100px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .action-icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.1s;
        }
        .action-icon-btn:active { transform: scale(0.9); }
        .action-icon-btn.liked { background: rgba(255, 51, 102, 0.3); border-color: var(--danger-color); color: var(--danger-color); }

        /* Explore & Profile Grid */
        .view-header {
            padding: 70px 20px 15px 20px;
            font-size: 1.3rem;
            font-weight: 800;
            border-bottom: 1px solid var(--border-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
        }

        .grid-item {
            aspect-ratio: 9 / 16;
            background: #161822;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .grid-item img, .grid-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-type-badge {
            position: absolute;
            top: 6px; right: 6px;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Profile Header */
        .profile-card {
            padding: 80px 20px 20px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(22,24,34,0.5), transparent);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff88, #00d2ff);
            margin: 0 auto 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #000;
            font-weight: 900;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 15px;
        }

        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-weight: 800; font-size: 1.1rem; }
        .stat-lbl { font-size: 0.75rem; color: #888; }

        /* Comments Drawer */
        .comments-drawer {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 500px;
            height: 55vh;
            background: #161822;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            z-index: 300;
            transition: transform 0.3s cubic-bezier(0.1, 1, 0.1, 1);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .comments-drawer.open { transform: translateX(-50%) translateY(0); }

        .comments-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .comment-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .comment-item {
            font-size: 0.85rem;
            background: rgba(0,0,0,0.25);
            padding: 8px 12px;
            border-radius: 10px;
            word-break: break-word;
        }

        .comment-user { color: var(--accent-color); font-weight: 600; margin-right: 6px; }

        .comment-input-area {
            padding: 12px 16px;
            background: #0b0c10;
            display: flex;
            gap: 8px;
            border-top: 1px solid var(--border-color);
        }

        .comment-input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.05);
            color: #fff;
            outline: none;
            font-size: 0.9rem;
        }

        /* Nav Bar */
        nav.tiktok-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            height: 65px;
            background: rgba(11, 12, 16, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            background: none;
            border: none;
            color: #777;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-item.active, .nav-item:hover { color: #fff; }
        .nav-icon { font-size: 1.3rem; }

        .upload-nav-btn {
            position: relative;
            width: 48px;
            height: 32px;
            background: linear-gradient(135deg, #00ff88, #00d2ff);
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 0 15px var(--accent-glow);
            overflow: visible;
        }

        .peeking-pigeon {
            position: absolute;
            top: -22px; left: 50%;
            transform: translateX(-50%) translateY(25px);
            font-size: 1.2rem;
            pointer-events: none;
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }

        .peeking-pigeon.peek { transform: translateX(-50%) translateY(0); opacity: 1; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 400;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #161822;
            padding: 28px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        button { cursor: pointer; border: none; border-radius: 12px; padding: 10px 16px; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #00ff88, #00c868); color: #000; box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-danger { background: var(--danger-color); color: #fff; }
        .btn-secondary { background: rgba(255, 255, 255, 0.06); color: var(--text-color); border: 1px solid var(--border-color); }

        #toast-container {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
        }

        .toast {
            background: rgba(22, 24, 34, 0.95);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px 18px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            text-align: center;
        }
        .toast.success { border-color: var(--accent-color); }
        .toast.error { border-color: var(--danger-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="onboarding-modal" class="modal">
        <div class="modal-content">
            <div class="logo"><span class="logo-icon">∞</span> ymt Loops</div>
            <h2>Willkommen!</h2>
            <p style="font-size: 0.85rem; color: #aaa;">Wähle deinen Usernamen:</p>
            <input type="text" id="setup-username" placeholder="z. B. ymtmanuel...">
            <button class="btn-primary" onclick="registerUser()">Starten</button>
        </div>
    </div>

    <header>
        <div class="logo"><span class="logo-icon">∞</span> ymt</div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <span id="current-user-display" style="font-size: 0.8rem; color: #aaa; font-weight: 600;"></span>
            <button id="admin-btn" class="btn-secondary" style="display:none; padding: 4px 10px; font-size: 0.75rem;" onclick="toggleAdmin()">Admin 🛡️</button>
        </div>
    </header>

    <!-- VIEWS -->
    <!-- 1. FEED VIEW -->
    <main id="feed-view" class="app-view active">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #666;">Lade Loops...</div>
    </main>

    <!-- 2. EXPLORE VIEW -->
    <div id="explore-view" class="app-view">
        <div class="view-header">🧭 Entdecken</div>
        <div class="grid-container" id="explore-grid">
            <p style="padding:20px; color:#666; grid-column: span 3;">Lade Medien...</p>
        </div>
    </div>

    <!-- 3. PROFILE VIEW -->
    <div id="profile-view" class="app-view">
        <div class="profile-card">
            <div class="profile-avatar" id="prof-avatar-letter">U</div>
            <h2 id="prof-username">@username</h2>
            <div class="profile-stats">
                <div class="stat-box">
                    <span class="stat-val" id="prof-count-posts">0</span>
                    <span class="stat-lbl">Posts</span>
                </div>
            </div>
        </div>
        <div style="padding: 10px 20px; font-weight: bold; border-bottom: 1px solid var(--border-color);">Deine Uploads</div>
        <div class="grid-container" id="profile-grid">
            <p style="padding:20px; color:#666; grid-column: span 3;">Keine eigenen Uploads.</p>
        </div>
    </div>

    <!-- COMMENTS DRAWER -->
    <div id="comments-drawer" class="comments-drawer">
        <div class="comments-header">
            <span>Kommentare</span>
            <button class="btn-secondary" style="padding: 4px 8px; font-size: 0.75rem;" onclick="closeComments()">✕</button>
        </div>
        <div class="comment-list" id="drawer-comment-list"></div>
        <div class="comment-input-area">
            <input type="text" id="drawer-cmt-input" placeholder="Schreibe einen Kommentar...">
            <button class="btn-primary" style="padding: 6px 14px;" onclick="addCommentFromDrawer()">Senden</button>
        </div>
    </div>

    <!-- UPLOAD MODAL -->
    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <h2>Neuer Post</h2>
            <p style="font-size: 0.8rem; color: #aaa;">Maximal ~800 KB (ohne Storage). Uploads werden vom Admin geprüft.</p>
            <input type="text" id="video-title" placeholder="Titel / Beschreibung...">
            <input type="file" id="video-file" accept="image/*,video/*">
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
                <button class="btn-secondary" onclick="closeModal('upload-modal')">Abbrechen</button>
                <button class="btn-primary" onclick="uploadMedia()">Hochladen</button>
            </div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="tiktok-nav">
        <button class="nav-item active" onclick="switchTab('feed-view', this)">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </button>
        <button class="nav-item" onclick="switchTab('explore-view', this)">
            <span class="nav-icon">🧭</span>
            <span>Entdecken</span>
        </button>
        
        <button class="upload-nav-btn" onclick="openModal('upload-modal')">
            +
            <div id="peeking-pigeon" class="peeking-pigeon">🕊️</div>
        </button>

        <button class="nav-item" onclick="showToast('Postfach ist leer', 'normal')">
            <span class="nav-icon">📥</span>
            <span>Postfach</span>
        </button>
        <button class="nav-item" onclick="switchTab('profile-view', this)">
            <span class="nav-icon">👤</span>
            <span>Profil</span>
        </button>
    </nav>

    <!-- JAVASCRIPT CODE -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBCFpS0xDeHl9EteigBUQq6nI2MCgyyoa8",
            authDomain: "pigeon-1e2cd.firebaseapp.com",
            projectId: "pigeon-1e2cd",
            storageBucket: "pigeon-1e2cd.firebasestorage.app",
            messagingSenderId: "538627864447",
            appId: "1:538627864447:web:8f917799e135b889bd4c4a",
            measurementId: "G-0F13EEQ4EQ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = localStorage.getItem("ymt_username") || "";
        let activeCommentDocId = null;

        function showToast(message, type = "normal") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function switchTab(viewId, btn) {
            document.querySelectorAll('.app-view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            if(btn) btn.classList.add('active');

            if (viewId === 'explore-view') loadExploreGrid();
            if (viewId === 'profile-view') loadProfileView();
        }

        function initUserSystem() {
            if (!currentUser) openModal('onboarding-modal');
            else updateUserUI();
        }

        function updateUserUI() {
            document.getElementById("current-user-display").innerText = `@${currentUser}`;
            document.getElementById("prof-username").innerText = `@${currentUser}`;
            document.getElementById("prof-avatar-letter").innerText = currentUser.charAt(0).toUpperCase();
        }

        async function registerUser() {
            const input = document.getElementById("setup-username").value.trim().toLowerCase();
            if (!input) return showToast("Bitte Username eingeben!", "error");

            try {
                const doc = await db.collection("usernames").doc(input).get();
                if (doc.exists) return showToast("Username vergeben!", "error");

                await db.collection("usernames").doc(input).set({ registeredAt: Date.now() });
                localStorage.setItem("ymt_username", input);
                currentUser = input;
                closeModal('onboarding-modal');
                updateUserUI();
                showToast(`Willkommen, @${currentUser}! 🎉`, "success");
            } catch(e) {
                showToast("Fehler bei der Registrierung!", "error");
            }
        }

        // FEED LADEN (Ohne Firestore-Index-Sperre!)
        function loadFeed() {
            const feedContainer = document.getElementById("feed-view");
            db.collection("loops")
              .where("status", "==", "approved")
              .onSnapshot(snapshot => {
                feedContainer.innerHTML = "";
                if (snapshot.empty) {
                    feedContainer.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:100vh; color:#666;">Noch keine Loops da. Poste den ersten!</div>';
                    return;
                }

                // In JS sortieren, um Firestore Index-Fehler zu vermeiden
                let docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                docs.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));

                docs.forEach(data => {
                    const likesList = data.likesList || [];
                    const hasLiked = likesList.includes(currentUser);
                    const comments = data.comments || [];
                    const isVerified = (data.username === "ymtmanuel");
                    const badge = isVerified ? '<span class="verified-badge">☑️</span>' : '';
                    const isVideo = data.type === "video";

                    const mediaElement = isVideo 
                        ? `<video src="${data.url}" autoplay muted loop playsinline></video>`
                        : `<img src="${data.url}" class="post-img" alt="Foto" />`;

                    const card = document.createElement("div");
                    card.className = "loop-card";
                    card.innerHTML = `
                        <div class="media-container">${mediaElement}</div>
                        
                        <div class="actions-right">
                            <button class="action-item" onclick="toggleLike('${data.id}')">
                                <div class="action-icon-btn ${hasLiked ? 'liked' : ''}">❤️</div>
                                <span>${likesList.length}</span>
                            </button>
                            <button class="action-item" onclick="openComments('${data.id}')">
                                <div class="action-icon-btn">💬</div>
                                <span>${comments.length}</span>
                            </button>
                        </div>

                        <div class="loop-info">
                            <div class="loop-author">@${escapeHtml(data.username || 'Anonym')} ${badge}</div>
                            <div class="loop-title">${escapeHtml(data.title)}</div>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            }, err => {
                showToast("Firestore Fehler beim Laden!", "error");
            });
        }

        // ENTDECKEN TAB GRID
        function loadExploreGrid() {
            const grid = document.getElementById("explore-grid");
            db.collection("loops").where("status", "==", "approved").get().then(snapshot => {
                grid.innerHTML = "";
                if (snapshot.empty) {
                    grid.innerHTML = '<p style="padding:20px; color:#666; grid-column: span 3;">Keine Uploads vorhanden.</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isVideo = data.type === "video";
                    const item = document.createElement("div");
                    item.className = "grid-item";
                    item.innerHTML = `
                        <span class="grid-type-badge">${isVideo ? '🎥' : '🖼️'}</span>
                        ${isVideo ? `<video src="${data.url}"></video>` : `<img src="${data.url}" />`}
                    `;
                    grid.appendChild(item);
                });
            });
        }

        // PROFIL VIEW
        function loadProfileView() {
            const grid = document.getElementById("profile-grid");
            const postCountEl = document.getElementById("prof-count-posts");

            db.collection("loops").where("username", "==", currentUser).get().then(snapshot => {
                grid.innerHTML = "";
                postCountEl.innerText = snapshot.size;

                if (snapshot.empty) {
                    grid.innerHTML = '<p style="padding:20px; color:#666; grid-column: span 3;">Du hast noch nichts hochgeladen.</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isVideo = data.type === "video";
                    const item = document.createElement("div");
                    item.className = "grid-item";
                    item.innerHTML = `
                        <span class="grid-type-badge">${isVideo ? '🎥' : '🖼️'}</span>
                        ${isVideo ? `<video src="${data.url}"></video>` : `<img src="${data.url}" />`}
                    `;
                    grid.appendChild(item);
                });
            });
        }

        async function toggleLike(docId) {
            if (!currentUser) return showToast("Bitte erst anmelden!", "error");
            const docRef = db.collection("loops").doc(docId);
            const doc = await docRef.get();
            if (!doc.exists) return;

            const likesList = doc.data().likesList || [];
            if (likesList.includes(currentUser)) {
                await docRef.update({
                    likesList: firebase.firestore.FieldValue.arrayRemove(currentUser)
                });
            } else {
                await docRef.update({
                    likesList: firebase.firestore.FieldValue.arrayUnion(currentUser)
                });
            }
        }

        async function openComments(docId) {
            activeCommentDocId = docId;
            const drawer = document.getElementById("comments-drawer");
            drawer.classList.add("open");
            loadCommentsIntoDrawer(docId);
        }

        function closeComments() {
            document.getElementById("comments-drawer").classList.remove("open");
            activeCommentDocId = null;
        }

        async function loadCommentsIntoDrawer(docId) {
            const listContainer = document.getElementById("drawer-comment-list");
            listContainer.innerHTML = '<p style="color:#666; text-align:center;">Lade Kommentare...</p>';
            
            const doc = await db.collection("loops").doc(docId).get();
            if (!doc.exists) return;

            const comments = doc.data().comments || [];
            if (comments.length === 0) {
                listContainer.innerHTML = '<p style="color:#666; text-align:center; margin-top:20px;">Noch keine Kommentare.</p>';
                return;
            }

            listContainer.innerHTML = comments.map(c => 
                `<div class="comment-item"><span class="comment-user">@${escapeHtml(c.user)}:</span>${escapeHtml(c.text)}</div>`
            ).join('');
        }

        async function addCommentFromDrawer() {
            if (!activeCommentDocId) return;
            const input = document.getElementById("drawer-cmt-input");
            const text = input.value.trim();
            if (!text) return;

            const newComment = {
                user: currentUser || "Anonym",
                text: text,
                time: Date.now()
            };

            await db.collection("loops").doc(activeCommentDocId).update({
                comments: firebase.firestore.FieldValue.arrayUnion(newComment)
            });

            input.value = "";
            loadCommentsIntoDrawer(activeCommentDocId);
            showToast("Kommentar gesendet! 💬", "success");
        }

        // UPLOAD MEDIA (Mit direkter Fehleranzeige)
        function uploadMedia() {
            const titleInput = document.getElementById("video-title");
            const fileInput = document.getElementById("video-file");
            const rawTitle = titleInput.value.trim();

            if (!rawTitle || !fileInput.files[0]) {
                return showToast("Titel und Datei auswählen!", "error");
            }

            const file = fileInput.files[0];
            const isVideo = file.type.startsWith('video/');
            const isImage = file.type.startsWith('image/');

            if (!isVideo && !isImage) {
                return showToast("Nur Bilder oder Videos erlaubt!", "error");
            }

            // GRENZE: 800 KB wegen Base64 & 1MB Firestore Limit
            const MAX_SIZE = 800 * 1024;
            if (file.size > MAX_SIZE) {
                return showToast("Datei zu groß! Max. 0.8 MB (Ohne Storage).", "error");
            }

            showToast("Wandle Datei um... ⏳", "normal");

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Url = e.target.result;
                const type = isVideo ? "video" : "image";
                saveToFirestore(rawTitle, base64Url, type);
            };
            
            reader.readAsDataURL(file);
        }

        async function saveToFirestore(title, url, type) {
            try {
                const initialStatus = (currentUser === "ymtmanuel") ? "approved" : "pending";

                await db.collection("loops").add({
                    username: currentUser,
                    title: title,
                    url: url,
                    type: type,
                    likesList: [],
                    comments: [],
                    status: initialStatus,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                if (initialStatus === "approved") {
                    showToast("Direkt veröffentlicht! 🚀", "success");
                } else {
                    showToast("Eingereicht! Wartet auf Freigabe ⏳", "success");
                }

                closeModal('upload-modal');
                document.getElementById("video-title").value = "";
                document.getElementById("video-file").value = "";
            } catch (err) {
                console.error("Firestore Upload Error:", err);
                showToast("Fehler beim Speichern in Firestore!", "error");
            }
        }

        function openModal(id) { document.getElementById(id).style.display = "flex"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        function escapeHtml(text) { return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ''; }

        initUserSystem();
        loadFeed();
    </script>
</body>
</html>
