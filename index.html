<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PigVin - Admin Panel</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .slide { height: 100vh; scroll-snap-align: start; border-bottom: 2px solid #222; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .panel { position: fixed; bottom: 20px; left: 20px; background: #111; padding: 20px; border: 2px solid #fff; z-index: 1000; }
        input { background: #000; color: #fff; border: 1px solid #555; padding: 10px; width: 300px; }
        button { background: #fff; color: #000; padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div id="feed"></div>

    <!-- Admin Panel -->
    <div class="panel">
        <input type="text" id="vUrl" placeholder="Video MP4 Link einfügen...">
        <button onclick="postVideo()">POSTEN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCFpS0xDeHl9EteigBUQq6nI2MCgyyoa8",
            authDomain: "pigeon-1e2cd.firebaseapp.com",
            databaseURL: "https://pigeon-1e2cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pigeon-1e2cd",
            storageBucket: "pigeon-1e2cd.firebasestorage.app",
            messagingSenderId: "538627864447",
            appId: "1:538627864447:web:8f917799e135b889bd4c4a",
            measurementId: "G-0F13EEQ4EQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Posten
        window.postVideo = () => {
            const url = document.getElementById('vUrl').value;
            if(!url) return;
            push(ref(db, 'videos'), { url: url });
            document.getElementById('vUrl').value = "";
            alert("Erfolgreich!");
        };

        // Feed anzeigen
        const feed = document.getElementById('feed');
        onValue(ref(db, 'videos'), (snapshot) => {
            feed.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                Object.values(data).forEach(v => {
                    feed.innerHTML += `
                        <div class="slide">
                            <video src="${v.url}" autoplay loop muted playsinline></video>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
