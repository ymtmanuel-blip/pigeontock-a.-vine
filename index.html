<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ymt Loops & Posts</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(22, 24, 34, 0.85);
            --accent-color: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --danger-color: #ff3366;
            --text-color: #f0f2f5;
            --verified-color: #00d2ff;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        header {
            width: 100%;
            max-width: 500px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(11,12,16,0.9), transparent);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #00ff88, #00d2ff);
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 0.8rem;
            font-weight: 900;
            -webkit-text-fill-color: initial;
        }

        .app-view {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            margin: 0 auto;
            display: none;
            padding-bottom: 70px;
            overflow-y: auto;
        }

        .app-view.active { display: block; }

        /* Feed Tab */
        #feed-view {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }

        .loop-card {
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* PERFEKTE ANPASSUNG FÜR QUERFORMAT & HOCHFORMAT */
        .media-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 1;
        }

        video, img.post-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Kein Abschneiden bei Querformat! */
            background: #000;
        }

        .loop-info {
            position: relative;
            z-index: 2;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 90px;
        }

        .loop-author {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .verified-badge { color: var(--verified-color); font-size: 1rem; }
        .loop-title { font-size: 0.95rem; color: #f0f2f5; text-shadow: 0 1px 3px rgba(0,0,0,0.8); line-height: 1.3; }

        .actions-right {
            position: absolute;
            right: 16px;
            bottom: 100px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .action-icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.1s;
        }
        .action-icon-btn:active { transform: scale(0.9); }
        .action-icon-btn.liked { background: rgba(255, 51, 102, 0.3); border-color: var(--danger-color); color: var(--danger-color); }

        /* Explore & Profile Grid */
        .view-header {
            padding: 70px 20px 15px 20px;
            font-size: 1.3rem;
            font-weight: 800;
            border-bottom: 1px solid var(--border-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
        }

        .grid-item {
            aspect-ratio: 9 / 16;
            background: #161822;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .grid-item img, .grid-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-type-badge {
            position: absolute;
            top: 6px; right: 6px;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Profile Header */
        .profile-card {
            padding: 80px 20px 20px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(22,24,34,0.5), transparent);
        }

        .profile-avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff88, #00d2ff);
            margin: 0 auto 12px auto;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #000; font-weight: 900;
        }

        .profile-stats {
            display: flex; justify-content: center; gap: 24px; margin-top: 15px;
        }

        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-weight: 800; font-size: 1.1rem; }
        .stat-lbl { font-size: 0.75rem; color: #888; }

        /* Comments Drawer */
        .comments-drawer {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%; max-width: 500px; height: 55vh;
            background: #161822;
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            z-index: 300;
            transition: transform 0.3s cubic-bezier(0.1, 1, 0.1, 1);
            display: flex; flex-direction: column;
            border: 1px solid var(--border-color);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .comments-drawer.open { transform: translateX(-50%) translateY(0); }

        .comments-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 600;
        }

        .comment-list {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .comment-item {
            font-size: 0.85rem;
            background: rgba(0,0,0,0.25);
            padding: 10px 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-word;
        }

        .report-flag-btn {
            background: none;
            border: none;
            color: #777;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 2px 6px;
        }
        .report-flag-btn:hover { color: var(--danger-color); }

        .comment-input-area {
            padding: 12px 16px;
            background: #0b0c10;
            display: flex; gap: 8px;
            border-top: 1px solid var(--border-color);
        }

        .comment-input-area input {
            flex: 1; padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.05);
            color: #fff; outline: none; font-size: 0.9rem;
        }

        /* Postfach Styling */
        .inbox-card {
            background: rgba(22,24,34,0.6);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .inbox-actions { display: flex; gap: 8px; margin-top: 6px; }

        /* Nav Bar */
        nav.tiktok-nav {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: 500px; height: 65px;
            background: rgba(11, 12, 16, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            background: none; border: none;
            color: #777; font-size: 0.75rem; font-weight: 600;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            cursor: pointer; transition: color 0.2s;
        }
        .nav-item.active, .nav-item:hover { color: #fff; }
        .nav-icon { font-size: 1.3rem; }

        .upload-nav-btn {
            width: 48px; height: 32px;
            background: linear-gradient(135deg, #00ff88, #00d2ff);
            border-radius: 10px; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #000; font-weight: 900; font-size: 1.2rem;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .modal {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 400; justify-content: center; align-items: center; padding: 20px;
        }

        .modal-content {
            background: #161822; padding: 28px; border-radius: 24px;
            width: 100%; max-width: 420px;
            display: flex; flex-direction: column; gap: 16px;
            border: 1px solid var(--border-color);
        }

        input[type="text"], input[type="file"] {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 1px solid var(--border-color); background: rgba(0, 0, 0, 0.4);
            color: #fff; font-size: 0.95rem; outline: none;
        }

        button { cursor: pointer; border: none; border-radius: 12px; padding: 10px 16px; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #00ff88, #00c868); color: #000; }
        .btn-danger { background: var(--danger-color); color: #fff; }
        .btn-secondary { background: rgba(255, 255, 255, 0.06); color: var(--text-color); border: 1px solid var(--border-color); }

        #toast-container {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%); z-index: 5000;
            display: flex; flex-direction: column; gap: 10px;
            width: 90%; max-width: 400px; pointer-events: none;
        }

        .toast {
            background: rgba(22, 24, 34, 0.95);
            border: 1px solid var(--border-color); color: #fff;
            padding: 12px 18px; border-radius: 14px; font-weight: 600; font-size: 0.9rem;
            animation: fadeIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards; text-align: center;
        }
        .toast.success { border-color: var(--accent-color); }
        .toast.error { border-color: var(--danger-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <!-- USERNAME MODAL -->
    <div id="onboarding-modal" class="modal">
        <div class="modal-content">
            <div class="logo"><span class="logo-icon">∞</span> ymt Loops</div>
            <h2>Willkommen!</h2>
            <p style="font-size: 0.85rem; color: #aaa;">Wähle deinen Usernamen:</p>
            <input type="text" id="setup-username" placeholder="z. B. ymtmanuel...">
            <button class="btn-primary" onclick="registerUser()">Starten</button>
        </div>
    </div>

    <header>
        <div class="logo"><span class="logo-icon">∞</span> ymt</div>
        <span id="current-user-display" style="font-size: 0.85rem; color: #aaa; font-weight: 600;"></span>
    </header>

    <!-- 1. FEED VIEW -->
    <main id="feed-view" class="app-view active">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #666;">Lade Loops...</div>
    </main>

    <!-- 2. EXPLORE VIEW -->
    <div id="explore-view" class="app-view">
        <div class="view-header">🧭 Entdecken</div>
        <div class="grid-container" id="explore-grid"></div>
    </div>

    <!-- 3. POSTFACH VIEW (MODERATION ZENTRALE FÜR @ymtmanuel) -->
    <div id="postfach-view" class="app-view">
        <div class="view-header">📥 Postfach & Meldungen</div>
        <div style="padding: 16px;" id="postfach-content">
            <p style="color:#666;">Lade Nachrichtencenter...</p>
        </div>
    </div>

    <!-- 4. PROFILE VIEW -->
    <div id="profile-view" class="app-view">
        <div class="profile-card">
            <div class="profile-avatar" id="prof-avatar-letter">U</div>
            <h2 id="prof-username">@username</h2>
            <div class="profile-stats">
                <div class="stat-box">
                    <span class="stat-val" id="prof-count-posts">0</span>
                    <span class="stat-lbl">Posts</span>
                </div>
            </div>
        </div>
        <div style="padding: 10px 20px; font-weight: bold; border-bottom: 1px solid var(--border-color);">Deine Uploads</div>
        <div class="grid-container" id="profile-grid"></div>
    </div>

    <!-- COMMENTS DRAWER -->
    <div id="comments-drawer" class="comments-drawer">
        <div class="comments-header">
            <span>Kommentare</span>
            <button class="btn-secondary" style="padding: 4px 8px; font-size: 0.75rem;" onclick="closeComments()">✕</button>
        </div>
        <div class="comment-list" id="drawer-comment-list"></div>
        <div class="comment-input-area">
            <input type="text" id="drawer-cmt-input" placeholder="Schreibe einen Kommentar...">
            <button class="btn-primary" style="padding: 6px 14px;" onclick="addCommentFromDrawer()">Senden</button>
        </div>
    </div>

    <!-- UPLOAD MODAL -->
    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <h2>Neuer Post</h2>
            <p style="font-size: 0.8rem; color: #aaa;">Max. ~800 KB. Dein Upload wird gescannt (Dauer bis zu 48 Std.).</p>
            <input type="text" id="video-title" placeholder="Titel / Beschreibung...">
            <input type="file" id="video-file" accept="image/*,video/*">
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
                <button class="btn-secondary" onclick="closeModal('upload-modal')">Abbrechen</button>
                <button class="btn-primary" onclick="uploadMedia()">Hochladen</button>
            </div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="tiktok-nav">
        <button class="nav-item active" onclick="switchTab('feed-view', this)">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </button>
        <button class="nav-item" onclick="switchTab('explore-view', this)">
            <span class="nav-icon">🧭</span>
            <span>Entdecken</span>
        </button>
        
        <button class="upload-nav-btn" onclick="openModal('upload-modal')">+</button>

        <button class="nav-item" onclick="switchTab('postfach-view', this)">
            <span class="nav-icon">📥</span>
            <span>Postfach</span>
        </button>
        <button class="nav-item" onclick="switchTab('profile-view', this)">
            <span class="nav-icon">👤</span>
            <span>Profil</span>
        </button>
    </nav>

    <!-- CODE LOGIK -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBCFpS0xDeHl9EteigBUQq6nI2MCgyyoa8",
            authDomain: "pigeon-1e2cd.firebaseapp.com",
            projectId: "pigeon-1e2cd",
            storageBucket: "pigeon-1e2cd.firebasestorage.app",
            messagingSenderId: "538627864447",
            appId: "1:538627864447:web:8f917799e135b889bd4c4a",
            measurementId: "G-0F13EEQ4EQ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = localStorage.getItem("ymt_username") || "";
        let activeCommentDocId = null;

        function showToast(message, type = "normal") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function switchTab(viewId, btn) {
            document.querySelectorAll('.app-view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            if(btn) btn.classList.add('active');

            if (viewId === 'explore-view') loadExploreGrid();
            if (viewId === 'profile-view') loadProfileView();
            if (viewId === 'postfach-view') loadPostfachView();
        }

        function initUserSystem() {
            if (!currentUser) openModal('onboarding-modal');
            else updateUserUI();
        }

        function updateUserUI() {
            document.getElementById("current-user-display").innerText = `@${currentUser}`;
            document.getElementById("prof-username").innerText = `@${currentUser}`;
            document.getElementById("prof-avatar-letter").innerText = currentUser.charAt(0).toUpperCase();
        }

        async function registerUser() {
            const input = document.getElementById("setup-username").value.trim().toLowerCase();
            if (!input) return showToast("Bitte Username eingeben!", "error");

            try {
                const doc = await db.collection("usernames").doc(input).get();
                if (doc.exists) return showToast("Username vergeben!", "error");

                await db.collection("usernames").doc(input).set({ registeredAt: Date.now() });
                localStorage.setItem("ymt_username", input);
                currentUser = input;
                closeModal('onboarding-modal');
                updateUserUI();
                showToast(`Willkommen, @${currentUser}! 🎉`, "success");
            } catch(e) {
                showToast("Fehler bei der Registrierung!", "error");
            }
        }

        // TON UMSCHALTEN (FIX FÜR HANDY-AUDIO)
        function toggleAudio(btn, videoId) {
            const video = document.getElementById(videoId);
            if (!video) return;
            video.muted = !video.muted;
            btn.innerText = video.muted ? '🔇' : '🔊';
            showToast(video.muted ? "Ton aus 🔇" : "Ton an 🔊", "normal");
        }

        // FEED LADEN
        function loadFeed() {
            const feedContainer = document.getElementById("feed-view");
            db.collection("loops")
              .where("status", "==", "approved")
              .onSnapshot(snapshot => {
                feedContainer.innerHTML = "";
                if (snapshot.empty) {
                    feedContainer.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:100vh; color:#666;">Keine Loops vorhanden.</div>';
                    return;
                }

                let docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                docs.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));

                docs.forEach((data, index) => {
                    const likesList = data.likesList || [];
                    const hasLiked = likesList.includes(currentUser);
                    const comments = data.comments || [];
                    const isVerified = (data.username === "ymtmanuel");
                    const badge = isVerified ? '<span class="verified-badge">☑️</span>' : '';
                    const isVideo = data.type === "video";
                    const videoElemId = `feed-video-${data.id}`;

                    const mediaElement = isVideo 
                        ? `<video id="${videoElemId}" src="${data.url}" autoplay muted loop playsinline></video>`
                        : `<img src="${data.url}" class="post-img" alt="Foto" />`;

                    const card = document.createElement("div");
                    card.className = "loop-card";
                    card.innerHTML = `
                        <div class="media-container">${mediaElement}</div>
                        
                        <div class="actions-right">
                            ${isVideo ? `
                                <button class="action-item" onclick="toggleAudio(this.querySelector('.action-icon-btn'), '${videoElemId}')">
                                    <div class="action-icon-btn">🔇</div>
                                    <span>Ton</span>
                                </button>
                            ` : ''}
                            <button class="action-item" onclick="toggleLike('${data.id}')">
                                <div class="action-icon-btn ${hasLiked ? 'liked' : ''}">❤️</div>
                                <span>${likesList.length}</span>
                            </button>
                            <button class="action-item" onclick="openComments('${data.id}')">
                                <div class="action-icon-btn">💬</div>
                                <span>${comments.length}</span>
                            </button>
                            <button class="action-item" onclick="reportContent('post', '${data.id}', '${escapeHtml(data.title)}')">
                                <div class="action-icon-btn">🚩</div>
                                <span>Melden</span>
                            </button>
                        </div>

                        <div class="loop-info">
                            <div class="loop-author">@${escapeHtml(data.username || 'Anonym')} ${badge}</div>
                            <div class="loop-title">${escapeHtml(data.title)}</div>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            });
        }

        // ENTDECKEN TAB GRID
        function loadExploreGrid() {
            const grid = document.getElementById("explore-grid");
            db.collection("loops").where("status", "==", "approved").get().then(snapshot => {
                grid.innerHTML = "";
                if (snapshot.empty) {
                    grid.innerHTML = '<p style="padding:20px; color:#666; grid-column: span 3;">Keine Uploads vorhanden.</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isVideo = data.type === "video";
                    const item = document.createElement("div");
                    item.className = "grid-item";
                    item.innerHTML = `
                        <span class="grid-type-badge">${isVideo ? '🎥' : '🖼️'}</span>
                        ${isVideo ? `<video src="${data.url}"></video>` : `<img src="${data.url}" />`}
                    `;
                    grid.appendChild(item);
                });
            });
        }

        // PROFIL VIEW
        function loadProfileView() {
            const grid = document.getElementById("profile-grid");
            const postCountEl = document.getElementById("prof-count-posts");

            db.collection("loops").where("username", "==", currentUser).get().then(snapshot => {
                grid.innerHTML = "";
                postCountEl.innerText = snapshot.size;

                if (snapshot.empty) {
                    grid.innerHTML = '<p style="padding:20px; color:#666; grid-column: span 3;">Du hast noch nichts hochgeladen.</p>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isVideo = data.type === "video";
                    const item = document.createElement("div");
                    item.className = "grid-item";
                    item.innerHTML = `
                        <span class="grid-type-badge">${isVideo ? '🎥' : '🖼️'}</span>
                        ${isVideo ? `<video src="${data.url}"></video>` : `<img src="${data.url}" />`}
                    `;
                    grid.appendChild(item);
                });
            });
        }

        // POSTFACH & MODERATION (Speziell angepasst für @ymtmanuel)
        async function loadPostfachView() {
            const container = document.getElementById("postfach-content");
            container.innerHTML = '<p style="color:#666;">Lade Postfach...</p>';

            // WENN BIST DU BIST (@ymtmanuel):
            if (currentUser === "ymtmanuel") {
                let html = '<h3 style="margin-bottom:12px; color:var(--accent-color);">🛡️ Admin Moderation</h3>';

                // 1. Ausstehende Posts
                const pendingSnap = await db.collection("loops").where("status", "==", "pending").get();
                html += `<h4>Ausstehende Uploads (${pendingSnap.size}):</h4><br>`;
                
                if (pendingSnap.empty) {
                    html += '<p style="color:#666; font-size:0.85rem;">Keine ausstehenden Uploads.</p><br>';
                } else {
                    pendingSnap.forEach(doc => {
                        const d = doc.data();
                        html += `
                            <div class="inbox-card">
                                <div><strong>@${escapeHtml(d.username)}</strong>: ${escapeHtml(d.title)}</div>
                                <div style="font-size:0.75rem; color:#aaa;">Typ: ${d.type}</div>
                                <div class="inbox-actions">
                                    <button class="btn-primary" style="padding:4px 10px; font-size:0.8rem;" onclick="approvePost('${doc.id}')">Freigeben ✅</button>
                                    <button class="btn-danger" style="padding:4px 10px; font-size:0.8rem;" onclick="rejectPost('${doc.id}')">Ablehnen ❌</button>
                                </div>
                            </div>
                        `;
                    });
                }

                // 2. Gemeldete Inhalte
                const reportsSnap = await db.collection("reports").get();
                html += `<h4 style="margin-top:15px;">Gemeldete Inhalte (${reportsSnap.size}):</h4><br>`;

                if (reportsSnap.empty) {
                    html += '<p style="color:#666; font-size:0.85rem;">Keine Meldungen vorhanden.</p>';
                } else {
                    reportsSnap.forEach(doc => {
                        const r = doc.data();
                        html += `
                            <div class="inbox-card" style="border-color:var(--danger-color);">
                                <div style="color:var(--danger-color); font-weight:bold;">🚩 Meldung (${r.targetType})</div>
                                <div style="font-size:0.85rem;">Inhalt: "${escapeHtml(r.contentSummary)}"</div>
                                <div style="font-size:0.75rem; color:#aaa;">Gemeldet von: @${escapeHtml(r.reportedBy)}</div>
                                <div class="inbox-actions">
                                    ${r.targetType === 'post' ? `<button class="btn-danger" style="padding:4px 10px; font-size:0.8rem;" onclick="deletePost('${r.targetId}', '${doc.id}')">Post Löschen 🗑️</button>` : ''}
                                    <button class="btn-secondary" style="padding:4px 10px; font-size:0.8rem;" onclick="dismissReport('${doc.id}')">Ignorieren 👁️</button>
                                </div>
                            </div>
                        `;
                    });
                }

                container.innerHTML = html;
            } else {
                // FÜR NORMALE USER:
                const myPendingSnap = await db.collection("loops")
                    .where("username", "==", currentUser)
                    .where("status", "==", "pending")
                    .get();

                let html = '<h3>Deine Upload-Benachrichtigungen</h3><br>';
                
                if (myPendingSnap.empty) {
                    html += '<p style="color:#aaa; font-size:0.9rem;">Keine aktiven Überprüfungen. Alle deine Posts sind freigeschaltet!</p>';
                } else {
                    myPendingSnap.forEach(doc => {
                        const d = doc.data();
                        html += `
                            <div class="inbox-card" style="border-color:var(--verified-color);">
                                <div style="font-weight:bold;">⏳ In Prüfung: "${escapeHtml(d.title)}"</div>
                                <p style="font-size:0.8rem; color:#ccc; margin-top:4px;">
                                    Bitte warten. Dein Beitrag wird gerade gescannt & geprüft.<br>
                                    <strong>Bearbeitungszeit: ca. 48 Stunden.</strong>
                                </p>
                            </div>
                        `;
                    });
                }

                container.innerHTML = html;
            }
        }

        // ADMIN AKTIONEN
        async function approvePost(docId) {
            await db.collection("loops").doc(docId).update({ status: "approved" });
            showToast("Post freigegeben! ✅", "success");
            loadPostfachView();
        }

        async function rejectPost(docId) {
            await db.collection("loops").doc(docId).delete();
            showToast("Post abgelehnt & gelöscht ❌", "normal");
            loadPostfachView();
        }

        async function deletePost(postId, reportId) {
            await db.collection("loops").doc(postId).delete();
            await db.collection("reports").doc(reportId).delete();
            showToast("Post endgültig gelöscht! 🗑️", "success");
            loadPostfachView();
        }

        async function dismissReport(reportId) {
            await db.collection("reports").doc(reportId).delete();
            showToast("Meldung verworfen 👁️", "normal");
            loadPostfachView();
        }

        // MELDEN-FUNKTION
        async function reportContent(targetType, targetId, contentSummary) {
            if (!currentUser) return showToast("Bitte erst anmelden!", "error");
            
            try {
                await db.collection("reports").add({
                    targetType: targetType,
                    targetId: targetId,
                    contentSummary: contentSummary,
                    reportedBy: currentUser,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast("Inhalt gemeldet! Danke 🚩", "success");
            } catch(e) {
                showToast("Fehler beim Melden!", "error");
            }
        }

        async function toggleLike(docId) {
            if (!currentUser) return showToast("Bitte erst anmelden!", "error");
            const docRef = db.collection("loops").doc(docId);
            const doc = await docRef.get();
            if (!doc.exists) return;

            const likesList = doc.data().likesList || [];
            if (likesList.includes(currentUser)) {
                await docRef.update({ likesList: firebase.firestore.FieldValue.arrayRemove(currentUser) });
            } else {
                await docRef.update({ likesList: firebase.firestore.FieldValue.arrayUnion(currentUser) });
            }
        }

        async function openComments(docId) {
            activeCommentDocId = docId;
            document.getElementById("comments-drawer").classList.add("open");
            loadCommentsIntoDrawer(docId);
        }

        function closeComments() {
            document.getElementById("comments-drawer").classList.remove("open");
            activeCommentDocId = null;
        }

        async function loadCommentsIntoDrawer(docId) {
            const listContainer = document.getElementById("drawer-comment-list");
            listContainer.innerHTML = '<p style="color:#666; text-align:center;">Lade Kommentare...</p>';
            
            const doc = await db.collection("loops").doc(docId).get();
            if (!doc.exists) return;

            const comments = doc.data().comments || [];
            if (comments.length === 0) {
                listContainer.innerHTML = '<p style="color:#666; text-align:center; margin-top:20px;">Noch keine Kommentare.</p>';
                return;
            }

            listContainer.innerHTML = comments.map(c => `
                <div class="comment-item">
                    <div><strong style="color:var(--accent-color);">@${escapeHtml(c.user)}:</strong> ${escapeHtml(c.text)}</div>
                    <button class="report-flag-btn" title="Kommentar melden" onclick="reportContent('comment', '${docId}', '${escapeHtml(c.user)}: ${escapeHtml(c.text)}')">🚩</button>
                </div>
            `).join('');
        }

        async function addCommentFromDrawer() {
            if (!activeCommentDocId) return;
            const input = document.getElementById("drawer-cmt-input");
            const text = input.value.trim();
            if (!text) return;

            const newComment = { user: currentUser || "Anonym", text: text, time: Date.now() };

            await db.collection("loops").doc(activeCommentDocId).update({
                comments: firebase.firestore.FieldValue.arrayUnion(newComment)
            });

            input.value = "";
            loadCommentsIntoDrawer(activeCommentDocId);
            showToast("Kommentar gesendet! 💬", "success");
        }

        // UPLOAD MEDIA
        function uploadMedia() {
            const titleInput = document.getElementById("video-title");
            const fileInput = document.getElementById("video-file");
            const rawTitle = titleInput.value.trim();

            if (!rawTitle || !fileInput.files[0]) {
                return showToast("Titel und Datei auswählen!", "error");
            }

            const file = fileInput.files[0];
            const isVideo = file.type.startsWith('video/');
            const isImage = file.type.startsWith('image/');

            if (!isVideo && !isImage) {
                return showToast("Nur Bilder oder Videos erlaubt!", "error");
            }

            const MAX_SIZE = 800 * 1024;
            if (file.size > MAX_SIZE) {
                return showToast("Datei zu groß! Max. 0.8 MB.", "error");
            }

            showToast("Verarbeite Datei... ⏳", "normal");

            const reader = new FileReader();
            reader.onload = function(e) {
                saveToFirestore(rawTitle, e.target.result, isVideo ? "video" : "image");
            };
            reader.readAsDataURL(file);
        }

        async function saveToFirestore(title, url, type) {
            try {
                // Auto-Approval für @ymtmanuel, sonst pending
                const initialStatus = (currentUser === "ymtmanuel") ? "approved" : "pending";

                await db.collection("loops").add({
                    username: currentUser,
                    title: title,
                    url: url,
                    type: type,
                    likesList: [],
                    comments: [],
                    status: initialStatus,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                if (initialStatus === "approved") {
                    showToast("Direkt veröffentlich! 🚀", "success");
                } else {
                    showToast("Eingereicht! Wird gescannt ⏳", "success");
                }

                closeModal('upload-modal');
                document.getElementById("video-title").value = "";
                document.getElementById("video-file").value = "";
            } catch (err) {
                showToast("Fehler beim Speichern!", "error");
            }
        }

        function openModal(id) { document.getElementById(id).style.display = "flex"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        function escapeHtml(text) { return text ? text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ''; }

        initUserSystem();
        loadFeed();
    </script>
</body>
</html>
