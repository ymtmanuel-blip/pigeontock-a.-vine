<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PigVin | ymtmanuel Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; overflow: hidden; margin: 0; }
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed::-webkit-scrollbar { display: none; }
        .slide { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        .mode-vine { --accent: #A3E635; }
        .mode-tok { --accent: #FE2C55; }
        .accent-bg { background-color: var(--accent); }
    </style>
</head>
<body class="mode-tok">

    <div id="login-modal" class="fixed inset-0 bg-black z-[500] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-4xl font-bold mb-8 italic">PIGVIN LOGIN</h1>
            <button onclick="loginWithGoogle()" class="w-full bg-white text-black font-bold p-4 rounded-xl flex items-center justify-center gap-2">
                Mit Google anmelden
            </button>
        </div>
    </div>

    <div id="admin-panel" class="hidden fixed inset-0 bg-black z-[600] p-6 overflow-y-auto">
        <h2 class="text-2xl font-bold mb-4">ADMIN DASHBOARD</h2>
        <div id="report-list" class="space-y-4"></div>
        <button onclick="document.getElementById('admin-panel').style.display='none'" class="mt-8 bg-zinc-800 p-4 w-full rounded-xl">SCHLIESSEN</button>
    </div>

    <!-- HEADER -->
    <div class="fixed top-0 w-full p-6 z-50 flex justify-between items-center">
        <button onclick="switchMode()" class="text-xl font-bold tracking-widest">PIGVIN</button>
        <button id="admin-btn" onclick="openAdmin()" class="hidden bg-white text-black px-3 py-1 rounded-full text-xs font-bold">ADMIN</button>
    </div>

    <div id="feed" class="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCFpS0xDeHl9EteigBUQq6nI2MCgyyoa8",
            authDomain: "pigeon-1e2cd.firebaseapp.com",
            projectId: "pigeon-1e2cd",
            storageBucket: "pigeon-1e2cd.firebasestorage.app",
            messagingSenderId: "538627864447",
            appId: "1:538627864447:web:8f917799e135b889bd4c4a",
            measurementId: "G-0F13EEQ4EQ"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        const ADMIN_EMAIL = "manueltiari08@gmail.com";

        window.loginWithGoogle = () => {
            signInWithPopup(auth, provider).catch((error) => {
                alert("Login fehlgeschlagen: " + error.message);
            });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-modal').style.display = 'none';
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('admin-btn').classList.remove('hidden');
                }
            } else {
                document.getElementById('login-modal').style.display = 'flex';
            }
        });

        window.switchMode = () => {
            document.body.classList.toggle('mode-vine');
        };

        window.openAdmin = () => {
            document.getElementById('admin-panel').style.display = 'block';
            onSnapshot(collection(db, "reports"), (snap) => {
                const list = document.getElementById('report-list');
                list.innerHTML = '';
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    list.innerHTML += `<div class="bg-zinc-900 p-4 rounded-xl">
                        <p>Post ID: ${data.postId}</p>
                        <p class="text-zinc-500">Von: ${data.reporter}</p>
                        <button onclick="deletePost('${data.postId}')" class="bg-red-600 mt-2 p-2 rounded">Delete Post</button>
                    </div>`;
                });
            });
        };

        window.deletePost = async (id) => { await deleteDoc(doc(db, "posts", id)); alert("Gelöscht!"); };

        const feed = document.getElementById('feed');
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snap) => {
            feed.innerHTML = '';
            snap.forEach(docSnap => {
                const data = docSnap.data();
                const div = document.createElement('div');
                div.className = 'slide';
                div.innerHTML = `
                    <img src="${data.url}" class="w-full h-full object-cover">
                    <div class="absolute bottom-20 right-6 flex flex-col gap-4">
                        <button onclick="reportPost('${docSnap.id}')" class="text-white">🚩</button>
                    </div>
                `;
                feed.appendChild(div);
            });
        });

        window.reportPost = async (id) => { 
            await addDoc(collection(db, "reports"), { postId: id, reporter: auth.currentUser.email }); 
            alert("Report gesendet!"); 
        };
    </script>
</body>
</html>
