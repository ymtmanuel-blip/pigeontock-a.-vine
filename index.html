<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PigVin - Admin Edition</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .video-slide { height: 100vh; scroll-snap-align: start; position: relative; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        input { padding: 15px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 15px; background: #fff; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Feed Bereich -->
    <div id="feed"></div>

    <!-- Post Bereich -->
    <div class="controls">
        <input type="text" id="urlInput" placeholder="MP4 Link hier einfügen...">
        <button onclick="postVideo()">POSTEN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCFpS0xDeHl9EteigBUQq6nI2MCgyyoa8",
            databaseURL: "https://pigeon-1e2cd-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pigeon-1e2cd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Video posten
        window.postVideo = () => {
            const url = document.getElementById('urlInput').value;
            if(!url) return alert("Link fehlt!");
            push(ref(db, 'videos'), { url: url });
            document.getElementById('urlInput').value = "";
            alert("Video ist online!");
        };

        // Feed live laden
        const feed = document.getElementById('feed');
        onValue(ref(db, 'videos'), (snapshot) => {
            feed.innerHTML = ""; 
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach((video) => {
                    feed.innerHTML += `
                        <div class="video-slide">
                            <video src="${video.url}" autoplay loop muted playsinline></video>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
